<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Primaria - Colegio Tlahtoani</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
margin:0;
background:
radial-gradient(circle at 10% 10%,rgba(183,255,0,.45),transparent 60%),
radial-gradient(circle at 90% 20%,rgba(10,132,255,.35),transparent 60%),
radial-gradient(circle at 50% 90%,rgba(255,159,10,.35),transparent 60%),
#f5f7fb;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

header{
display:flex;
align-items:center;
gap:15px;
background:white;
padding:15px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.logo{
width:50px;
height:50px;
border-radius:15px;
background:white;
display:flex;
align-items:center;
justify-content:center;
}

.logo img{
width:80%;
}

.title{
font-weight:900;
font-size:20px;
}

.subtitle{
font-size:13px;
color:#666;
}

.hero{
margin-top:20px;
background:white;
border-radius:25px;
padding:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.hero h1{
font-size:32px;
font-weight:900;
background:linear-gradient(90deg,#0a84ff,#34c759,#7c3aed);
-webkit-background-clip:text;
color:transparent;
}

.coop{
margin-top:20px;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

.coop h2{
margin-bottom:10px;
}

.item{
margin:4px 0;
font-size:14px;
}

.price{
float:right;
font-weight:800;
}

</style>
</head>

<body>

<div class="container">

<header>

<div class="logo">
<img src="logo.png">
</div>

<div>
<div class="title">Colegio Tlahtoani</div>
<div class="subtitle">Menú Primaria</div>
</div>

</header>

<div class="hero">
<h1>Cooperativa Escolar</h1>
</div>

<div class="coop">

<h2>Desayunos</h2>

<div class="item">Crepas <span class="price">$50</span></div>

<h2>Comidas</h2>

<div class="item">Filete de pollo con sopa de códitos</div>
<div class="item">Albóndigas en caldo con verduras y arroz</div>
<div class="item">Caldo de pollo con verduras y arroz</div>
<div class="item">Espagueti a la boloñesa</div>
<div class="item">Tortas de papa con salsa y arroz</div>

</div>

</div>

</body>
</html>
