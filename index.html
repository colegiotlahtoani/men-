<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú Primaria</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f5fff5;
}

header{
background:linear-gradient(90deg,#43a047,#8bc34a);
color:white;
text-align:center;
padding:25px;
font-size:28px;
font-weight:600;
}

.seccion{
padding:40px 20px;
}

.titulo{
text-align:center;
font-size:28px;
margin-bottom:25px;
color:#1b5e20;
}

.menu-grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:18px;
border-radius:14px;
width:200px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
text-align:center;
}

.card h3{
margin-top:0;
color:#2e7d32;
}

.precio{
font-weight:600;
color:#1b5e20;
}

footer{
text-align:center;
padding:20px;
font-size:14px;
color:#555;
}

/* celular */

@media (max-width:600px){

.menu-grid{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
}

}

</style>
</head>

<body>

<header>
Menú Primaria
</header>


<section class="seccion">

<h2 class="titulo">Cooperativa</h2>

<div class="menu-grid">

<div class="card">
<h3>Desayunos</h3>
<p>Quesadillas</p>
<p>Molletes</p>
<p>Chilaquiles</p>
</div>

<div class="card">
<h3>Comidas</h3>
<p>Platillo del día</p>
</div>

<div class="card">
<h3>Snacks</h3>
<p>Fruta</p>
<p>Gelatina</p>
<p>Papas</p>
</div>

<div class="card">
<h3>Bebidas</h3>
<p>Agua fresca</p>
<p>Jugos</p>
</div>

<div class="card">
<h3>Especial</h3>
<p>Crepas</p>
<p class="precio">$50</p>
</div>

</div>

</section>


<footer>
Cooperativa Escolar
</footer>

</body>
</html>
